<div class="home-container">
  <div class="atm-card">
    <h1 class="titulo">Cajeros Automáticos</h1>

    <p class="subtitulo">Selecciona tu banco</p>

    <div class="d-grid gap-3">
      <button
        *ngFor="let banco of bancos"
        class="btn banco-btn"
        [ngClass]="obtenerClaseBanco(banco.nombre)"
        (click)="irCajero(banco.nombre)"
      >
        {{ banco.nombre }}
      </button>
    </div>
  </div>
</div>
